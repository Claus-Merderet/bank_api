# Top-level stack for the SCAM BANK demo: backend polygon + built frontend.
# One command brings up the whole app:
#   docker compose -f docker-compose.app.yml up --build
# Frontend nginx publishes :8080 and proxies /api to the backend over the
# internal compose network. The backend port 4111 stays internal (not published)
# so it never conflicts with a separately running `bank_api` container.

services:
    backend:
        image: clausmerderet/bank_api:latest
        # Port 4111 is intentionally NOT published — it is reached only via the
        # compose network by the frontend nginx (service DNS name `backend`).
        networks:
            - app-net
        # Backend needs ~10s (migrations + fixtures) before nginx:4111 is ready.
        # wget is present in the image; hitting the swagger endpoint over IPv4
        # (nginx listens on 0.0.0.0:4111, localhost/::1 is refused) gates readiness.
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4111/api/swagger || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    frontend:
        build: ./frontend
        ports:
            - "8080:80"
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - app-net

networks:
    app-net:
        driver: bridge
