server {
    listen 4111;
    server_name localhost;
    server_tokens off;

    # React SPA root — Task 2 (Dockerfile) copies the built Vite dist here.
    root /var/www/frontend;
    index index.html;

    # Symfony API (covers /api/swagger page, /api/auth/token/login, all handlers).
    location /api {
        root /var/www/html/public;
        try_files $uri /index.php$is_args$args;
    }

    # Swagger UI static assets — served straight from Symfony public/, never proxied to PHP.
    location /bundles/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    location /nelmioapidoc/ {
        root /var/www/html/public;
        try_files $uri =404;
    }

    location ~ ^/index\.php(/|$) {
        root /var/www/html/public;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # SPA fallback LAST — client-side react-router; /assets/* served as files from /var/www/frontend.
    location / {
        try_files $uri /index.html;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}
