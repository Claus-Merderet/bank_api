server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in responses/error pages (V14 hygiene).
    server_tokens off;

    # SPA deep-link fallback: any unknown path returns index.html,
    # client-side routing (react-router) takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api to the backend by its compose service name.
    # No trailing slash after the port: the /api prefix is preserved so the
    # Symfony backend receives /api/... intact. A trailing slash would strip
    # /api and break routing.
    location /api {
        # Resolve the `backend` service name at request time via docker's
        # embedded DNS (127.0.0.11) instead of caching a single IP at config
        # load. If the backend container restarts and gets a new bridge IP,
        # nginx re-resolves within valid=10s instead of getting stuck on a
        # stale address and returning 502.
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:4111;
        # When a variable is used in proxy_pass, nginx does NOT auto-append the
        # location-matched URI, so we pass $request_uri explicitly. This keeps
        # the full /api/... path (and query string) intact to the backend —
        # equivalent to the old no-trailing-slash behavior, no /api stripping.
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Authorization is forwarded to the upstream by default — the client
        # Bearer JWT reaches the backend. Do NOT override or clear it.
    }
}
