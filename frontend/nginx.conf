server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in responses/error pages (V14 hygiene).
    server_tokens off;

    # SPA deep-link fallback: any unknown path returns index.html,
    # client-side routing (react-router) takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy /api to the backend by its compose service name.
    # No trailing slash after the port: the /api prefix is preserved so the
    # Symfony backend receives /api/... intact. A trailing slash would strip
    # /api and break routing.
    location /api {
        proxy_pass http://backend:4111;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Authorization is forwarded to the upstream by default — the client
        # Bearer JWT reaches the backend. Do NOT override or clear it.
    }
}
